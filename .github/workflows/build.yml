# Régénère les JSON de données (classements/tournois) depuis Jeff Sackmann
# 1×/semaine (+ manuel + à chaque maj du script) et commit le résultat.
# Les CSV Sackmann sont récupérés par git (actions/checkout, fiable) — pas de fetch
# raw.githubusercontent (rate-limité depuis les runners).

name: build-tennis-data

on:
  push:
    branches: [main]
    paths-ignore:          # évite la boucle : les commits de données ne relancent pas
      - 'players/**'
      - 'rankings/**'
      - 'tournaments/**'
  schedule:
    - cron: '17 6 * * 1'   # lundis 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # git clone direct (repos publics, anonyme, sans API) — évite le 404 d'actions/checkout tiers.
      - name: Récupérer les données Sackmann (sparse)
        run: |
          set -e
          for t in atp wta; do
            git clone --depth 1 --filter=blob:none --sparse "https://github.com/JeffSackmann/tennis_${t}.git" "sackmann/${t}"
            git -C "sackmann/${t}" sparse-checkout set --no-cone \
              "${t}_players.csv" "${t}_rankings_20s.csv" "${t}_rankings_current.csv" "${t}_matches_2026.csv"
            echo "--- sackmann/${t} ---"; ls -la "sackmann/${t}" | grep -E '\.csv|total' || true
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Générer les JSON
        run: node build.mjs

      - name: Commit si changement
        run: |
          rm -rf sackmann
          git config user.name  "tennis-data-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then echo "Aucun changement."; exit 0; fi
          git commit -m "data: maj classements/tournois $(date -u +%F)"
          git pull --rebase origin main || true
          git push
