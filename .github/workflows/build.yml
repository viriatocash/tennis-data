# Régénère les JSON de données (classements, bio, index, stats service/retour) ATP & WTA
# 1×/jour (+ manuel + à chaque maj du script) et commit le résultat.
# Sources : BallDontLie (base rankings/history/tournois, secret BALLDONTLIE_KEY) +
# api-tennis.com (enrichissement V/D/GC/sets/ELO/SOS + vainqueurs, secret API_TENNIS_KEY).
# Les deux clés sont des secrets GitHub, jamais exposées.

name: build-tennis-data

on:
  push:
    branches: [main]
    paths-ignore:          # évite la boucle : les commits de données ne relancent pas
      - 'players/**'
      - 'rankings/**'
      - 'tournaments/**'
      - 'stats/**'
      - 'index/**'
  schedule:
    - cron: '17 6 * * *'   # tous les jours 06:17 UTC (rafraîchissement quotidien)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Générer les JSON (classements/joueurs/bio/index + enrichissement api-tennis)
        run: node build.mjs
        env:
          BALLDONTLIE_KEY: ${{ secrets.BALLDONTLIE_KEY }}
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}

      - name: Générer les stats service/retour (Match Charting Project)
        run: node build-mcp-stats.mjs

      - name: Commit si changement
        run: |
          git config user.name  "tennis-data-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then echo "Aucun changement."; exit 0; fi
          git commit -m "data: maj classements/tournois $(date -u +%F)"
          git pull --rebase origin main || true
          git push
